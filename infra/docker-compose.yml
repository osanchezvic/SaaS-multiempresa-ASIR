version: '3.8'

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer_global
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - infra_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_global
    restart: unless-stopped
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - infra_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_global
    restart: unless-stopped
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./monitorizacion/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - infra_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_global
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false


    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_config:/etc/grafana
    depends_on:
      - prometheus
    networks:
      - infra_net

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DB_MYSQL_HOST: ${NPM_DB_HOST:-db}
      DB_MYSQL_PORT: ${NPM_DB_PORT:-3306}
      DB_MYSQL_USER: ${NPM_DB_USER:-npm}
      DB_MYSQL_PASSWORD: ${NPM_DB_PASSWORD:-npm123}
      DB_MYSQL_NAME: ${NPM_DB_NAME:-npm}
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt
    depends_on:
      - npm_db
    networks:
      - infra_net

  npm_db:
    image: "jc21/mariadb-aria:latest"
    container_name: npm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_ROOT_PASSWORD:-npm123}
      MYSQL_DATABASE: ${NPM_DB_NAME:-npm}
      MYSQL_USER: ${NPM_DB_USER:-npm}
      MYSQL_PASSWORD: ${NPM_DB_PASSWORD:-npm123}
    volumes:
      - ./proxy/mysql:/var/lib/mysql
    networks:
      - infra_net

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower_global
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -q watchtower || exit 1"]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - infra_net

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban_global
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f fail2ban-server >/dev/null"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/log:/var/log:ro
      - ./seguridad/fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - fail2ban_data:/var/lib/fail2ban
    environment:
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=30d

volumes:
  portainer_data:
  prometheus_data:
  grafana_data:
  grafana_config:
  fail2ban_data:

networks:
  infra_net:
    driver: bridge
    name: infra_net