server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: argon2
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 1h
  inactivity: 5m
  domain: osanchez.org # Tu dominio real
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
  local:
    path: /config/db.sqlite3

jwt_secret: "${AUTHELIA_JWT_SECRET}"

identity_validation:
  reset_password:
    jwt_secret: "${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}"

access_control:
  default_policy: deny
  rules:
    - domain: "auth.osanchez.org"
      policy: bypass
    - domain: "panel.osanchez.org"
      policy: two_factor # AQUÍ ACTIVAMOS EL 2FA
    - domain: "*.osanchez.org"
      policy: two_factor

totp:
  issuer: ASIR_SaaS

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

notifier:
  filesystem:
    filename: /config/notification.txt
